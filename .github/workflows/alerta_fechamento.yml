name: Alerta de Fechamento ROC

on:
  schedule:
    # Roda todo dia às 11:00 UTC = 08:00 de Brasília.
    # Ajuste o número da hora se quiser outro horário (formato UTC).
    - cron: '0 11 * * *'
  workflow_dispatch:   # permite rodar manualmente pelo botão "Run workflow"

jobs:
  enviar-alertas:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install psycopg2-binary sendgrid

      - name: Rodar alerta de fechamento
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REMETENTE_EMAIL: ${{ secrets.REMETENTE_EMAIL }}
          REMETENTE_NOME: ${{ secrets.REMETENTE_NOME }}
          APP_URL: ${{ secrets.APP_URL }}
        run: python alerta_fechamento.py
